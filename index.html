<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欧中合作发展基金会 - 让世界看见中国非遗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'eccdf-blue': '#0F172A',
                        'eccdf-gold': '#F59E0B',
                    }
                }
            }
        }
    </script>
    <style>
        .hero-bg-custom {
            /* 确保图片文件名与仓库中的一致 */
            background-image: url('image_f8569d.png');
            background-size: cover;
            background-position: center;
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 你的遮罩代码层 */
        .hero-bg-custom::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(15, 23, 42, 0.7) 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 10;
            text-align: center;
            color: white;
        }

        /* 语言切换按钮样式 */
        .lang-btn.active { 
            color: #F59E0B;
            font-weight: bold;
            border-bottom: 2px solid #F59E0B;
        }
    </style>
</head>
<body>
    <nav class="fixed w-full z-50 bg-white/90 backdrop-blur-md px-6 py-4 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-2">
            <span class="font-bold text-xl text-eccdf-blue">欧中合作发展基金会</span>
        </div>
        <div class="flex space-x-4 items-center">
            <button class="lang-btn active">ZH</button>
            <button class="lang-btn">EN</button>
            <button class="lang-btn">HU</button>
            <button class="bg-eccdf-blue text-white px-4 py-2 rounded-md">联系我们</button>
        </div>
    </nav>

    <section class="hero-bg-custom">
        <div class="hero-content px-4">
            <h1 class="text-4xl md:text-6xl font-bold mb-4">让世界看见中国非遗 [cite: 1]</h1>
            <p class="text-xl md:text-2xl text-eccdf-gold mb-8">—— 构建中国非遗走向欧洲的新平台 [cite: 2]</p>
            <p class="max-w-2xl mx-auto text-slate-300 mb-10">
                致力于推动中国与欧洲在文化、教育、科技及经贸领域的合作交流 [cite: 8]。
            </p>
            <div class="flex flex-col sm:flex-row justify-center gap-4">
                <button class="bg-eccdf-gold text-eccdf-blue px-8 py-3 rounded font-bold">了解项目</button>
                <button class="border border-white px-8 py-3 rounded font-bold">我们的使命</button>
            </div>
        </div>
    </section>
</body>
</html>
